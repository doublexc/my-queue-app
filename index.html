<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคิว Serverless</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-500">
            <h2 class="text-2xl font-bold mb-4 text-blue-600">สร้างคิวใหม่</h2>
            
            <div id="restoreSection" class="mb-4 p-4 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                <p class="text-xs text-gray-500 mb-2 font-bold">มีคิวเดิมอยู่แล้ว?</p>
                <div class="flex gap-2">
                    <input type="text" id="restoreID" placeholder="รหัสคิว 6 หลัก" class="flex-1 p-2 border rounded-lg text-sm uppercase">
                    <button onclick="restoreOwnerSession()" class="bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow">กู้คืน</button>
                </div>
            </div>

            <button onclick="createNewQueue()" id="btnCreate" class="w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 transition font-bold shadow-md">
                กดเพื่อสร้างรหัสคิว
            </button>

            <div id="ownerPanel" class="mt-6 hidden">
                <div class="bg-blue-50 p-4 rounded-lg text-center relative">
                    <p class="text-sm text-gray-500">รหัสคิวของคุณคือ</p>
                    <h1 id="displayQueueID" class="text-4xl font-black text-blue-700 tracking-widest">------</h1>
                    <button onclick="manualRefreshOwner()" class="mt-2 text-xs bg-white text-blue-500 px-3 py-1 rounded-full shadow-sm border border-blue-200 hover:bg-blue-50">🔄 อัปเดตข้อมูล</button>
                </div>
                
                <div class="flex items-center justify-between mt-6 px-4">
                    <button onclick="updateNumber(-1)" class="bg-red-100 text-red-600 px-5 py-3 rounded-xl font-bold hover:bg-red-200 transition">- ลด</button>
                    <div class="flex gap-8">
                        <div class="text-center">
                            <p class="text-[10px] text-gray-400 uppercase font-bold">กำลังเรียก</p>
                            <span id="currentNum" class="text-4xl font-black text-blue-600">0</span>
                        </div>
                        <div class="text-center border-l-2 pl-8">
                            <p class="text-[10px] text-gray-400 uppercase font-bold">คิวสุดท้าย</p>
                            <span id="latestNum" class="text-4xl font-black text-gray-300">0</span>
                        </div>
                    </div>
                    <button onclick="updateNumber(1)" class="bg-green-100 text-green-600 px-5 py-3 rounded-xl font-bold hover:bg-green-200 transition">+ เพิ่ม</button>
                </div>

                <div class="mt-8 p-4 border-t border-dashed text-center">
                    <p class="text-xs text-gray-400 mb-2 font-bold">รหัสยืนยันลำดับนี้ (Verification Code)</p>
                    <p id="ownerVCode" class="text-[11px] break-all font-mono text-blue-800 bg-blue-50 p-3 rounded-lg border border-blue-100">รอข้อมูล...</p>
                </div>
                
                <button onclick="cancelQueue()" class="w-full mt-6 text-gray-400 text-xs hover:text-red-500 transition underline">ยกเลิกคิวและล้างข้อมูลทั้งหมด</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-purple-500">
            <h2 class="text-2xl font-bold mb-4 text-purple-600">เข้าคิว</h2>
            <div class="flex gap-2">
                <input type="text" id="inputQueueID" placeholder="ใส่รหัส 6 หลัก" class="flex-1 border-2 p-3 rounded-xl focus:outline-none focus:border-purple-400 uppercase font-bold text-center tracking-widest">
                <button onclick="checkQueueStatus()" class="bg-purple-500 text-white px-6 py-3 rounded-xl hover:bg-purple-600 font-bold shadow-md transition">ตรวจสอบ</button>
            </div>

            <div id="userPanel" class="mt-6 hidden">
                <div class="flex justify-end mb-2">
                    <button onclick="manualRefreshUser()" class="text-xs bg-purple-50 text-purple-500 px-3 py-1 rounded-full border border-purple-100">🔄 อัปเดตสถานะ</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4 text-center">
                    <div class="bg-purple-50 p-4 rounded-xl border border-purple-100">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">กำลังเรียก</p>
                        <p id="userCurrentNum" class="text-3xl font-black text-purple-700">0</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">เฉลี่ย/คิว (นาที)</p>
                        <p id="avgTime" class="text-3xl font-black text-gray-700">--</p>
                    </div>
                </div>

                <button id="btnJoin" onclick="joinQueue()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white py-4 rounded-xl font-black shadow-lg hover:scale-[1.02] transition transform">
                    กดเพื่อรับลำดับคิวของคุณ
                </button>

                <div id="myQueueTicket" class="mt-6 p-6 border-2 border-purple-300 border-dashed rounded-2xl bg-purple-50/30 hidden">
                    <p class="text-center text-sm text-gray-500 font-bold">ลำดับของคุณคือ</p>
                    <h2 id="myNumber" class="text-6xl text-center font-black my-4 text-purple-600 drop-shadow-sm">0</h2>
                    
                    <div class="space-y-3 mt-4 text-sm bg-white p-4 rounded-xl shadow-sm">
                        <div class="flex justify-between items-center text-gray-600 border-b pb-2">
                            <span>รออีกประมาณ:</span>
                            <span id="estTime" class="font-bold text-lg text-orange-500">-- นาที</span>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 mb-1 font-bold">รหัสยืนยันของคุณ (24 หลัก)</p>
                            <div class="flex gap-2">
                                <input readonly id="myVCode" class="flex-1 text-[10px] bg-gray-50 p-2 rounded border font-mono">
                                <button onclick="copyVCode()" class="text-xs bg-purple-100 text-purple-600 px-3 py-1 rounded-lg font-bold hover:bg-purple-200">Copy</button>
                            </div>
                        </div>
                    </div>
                    <button onclick="cancelMyQueue()" class="w-full mt-4 text-red-500 text-xs underline hover:text-red-700">ยกเลิกคิวนี้</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXDGS2lu5oAXJlB5ieDS-7znt7qWABO7d0ym9D9LD5DPqH1rVQhlqDlx2byY9tbpJb/exec";

        // ตรวจสอบข้อมูลเดิมเมื่อโหลดหน้า
        window.onload = () => {
            const savedOwnerID = localStorage.getItem('ownerQueueID');
            const savedUserID = localStorage.getItem('userQueueID');
            const savedMyNum = localStorage.getItem('myNumber');

            if (savedOwnerID) {
                document.getElementById('displayQueueID').innerText = savedOwnerID;
                document.getElementById('ownerPanel').classList.remove('hidden');
                document.getElementById('btnCreate').classList.add('hidden');
                document.getElementById('restoreSection').classList.add('hidden');
                refreshOwnerData(savedOwnerID);
            }
            if (savedUserID && savedMyNum) {
                document.getElementById('inputQueueID').value = savedUserID;
                document.getElementById('myNumber').innerText = savedMyNum;
                document.getElementById('myQueueTicket').classList.remove('hidden');
                document.getElementById('btnJoin').classList.add('hidden');
                checkQueueStatus();
            }
        };

        // --- ระบบอัปเดตอัตโนมัติ (15 นาที) ---
        setInterval(() => {
            const ownerID = localStorage.getItem('ownerQueueID');
            const userID = localStorage.getItem('userQueueID');
            if (ownerID) refreshOwnerData(ownerID);
            if (userID) updateUserUI(userID);
        }, 900000); 

        // --- ฟังก์ชันฝั่งเจ้าของ ---
        async function createNewQueue() {
            Swal.fire({ title: 'กำลังสร้างคิว...', didOpen: () => { Swal.showLoading() } });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'create' }) });
            const data = await res.json();
            if(data.status === 'success') {
                localStorage.setItem('ownerQueueID', data.queueID);
                location.reload();
            }
        }

        function restoreOwnerSession() {
            const id = document.getElementById('restoreID').value.toUpperCase();
            if(id.length === 6) {
                localStorage.setItem('ownerQueueID', id);
                location.reload();
            }
        }

        async function updateNumber(step) {
            const qID = document.getElementById('displayQueueID').innerText;
            const type = (step === 1) ? 'plus' : 'minus';
            Swal.fire({ title: 'อัปเดต...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', queueID: qID, type: type }) });
            const data = await res.json();
            if(data.status === 'success') {
                refreshOwnerData(qID);
                Swal.close();
            }
        }

        async function refreshOwnerData(qID) {
            const ownerToken = localStorage.getItem('ownerQueueID');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'status', queueID: qID, ownerToken: ownerToken }) });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('currentNum').innerText = data.currentNumber;
                    document.getElementById('latestNum').innerText = data.latestNumber;
                    document.getElementById('ownerVCode').innerText = data.vCode;
                }
            } catch (e) { console.error(e); }
        }

        function manualRefreshOwner() {
            const ownerID = localStorage.getItem('ownerQueueID');
            if(ownerID) {
                refreshOwnerData(ownerID);
                Swal.fire({ title: 'อัปเดตแล้ว', icon: 'success', toast: true, position: 'top', timer: 1500, showConfirmButton: false });
            }
        }

        // --- ฟังก์ชันฝั่งผู้ใช้ ---
        async function checkQueueStatus() {
            const qID = document.getElementById('inputQueueID').value.toUpperCase();
            if(!qID) return;
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'status', queueID: qID }) });
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('userPanel').classList.remove('hidden');
                updateUserUI(qID);
            }
        }

        async function joinQueue() {
            const qID = document.getElementById('inputQueueID').value.toUpperCase();
            Swal.fire({ title: 'กำลังต่อคิว...', didOpen: () => { Swal.showLoading() } });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'join', queueID: qID }) });
            const data = await res.json();
            if(data.status === 'success') {
                localStorage.setItem('userQueueID', qID);
                localStorage.setItem('myNumber', data.customerNumber);
                localStorage.setItem('myVCode', data.vCode); // บันทึก VCode ลงเครื่อง
                document.getElementById('myNumber').innerText = data.customerNumber;
                document.getElementById('myVCode').value = data.vCode;
                document.getElementById('myQueueTicket').classList.remove('hidden');
                document.getElementById('btnJoin').classList.add('hidden');
                updateUserUI(qID);
                Swal.fire('สำเร็จ!', `ลำดับของคุณคือ ${data.customerNumber}`, 'success');
            }
        }

        async function updateUserUI(qID) {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'status', queueID: qID }) });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('userCurrentNum').innerText = data.currentNumber;
                    document.getElementById('avgTime').innerText = data.avgTime;
                    
                    const savedVCode = localStorage.getItem('myVCode');
                    if (savedVCode) document.getElementById('myVCode').value = savedVCode;

                    const myNum = parseInt(document.getElementById('myNumber').innerText);
                    if (myNum > 0) {
                        const waitCount = myNum - data.currentNumber;
                        const avg = parseFloat(data.avgTime) || 0;
                        const est = waitCount > 0 ? Math.ceil(waitCount * avg) : 0;
                        document.getElementById('estTime').innerText = est + " นาที";
                    }
                }
            } catch (e) { }
        }

        function manualRefreshUser() {
            const userID = localStorage.getItem('userQueueID');
            if(userID) {
                updateUserUI(userID);
                Swal.fire({ title: 'อัปเดตแล้ว', icon: 'success', toast: true, position: 'top', timer: 1500, showConfirmButton: false });
            }
        }

        async function cancelMyQueue() {
            const qID = localStorage.getItem('userQueueID');
            const myNum = localStorage.getItem('myNumber');
            const vCode = localStorage.getItem('myVCode');

            const result = await Swal.fire({
                title: 'ยืนยันการยกเลิก?',
                text: "ลำดับของคุณจะถูกลบออกจากระบบ",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ใช่, ยกเลิกคิว',
                cancelButtonText: 'ไม่'
            });

            if (result.isConfirmed) {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'cancelCustomer', queueID: qID, customerNumber: myNum, vCode: vCode })
                });
                const data = await res.json();
                if(data.status === 'success') {
                    localStorage.clear();
                    Swal.fire('ยกเลิกแล้ว', '', 'success').then(() => location.reload());
                }
            }
        }

        function copyVCode() {
            const el = document.getElementById('myVCode');
            el.select();
            document.execCommand('copy');
            Swal.fire({ title: 'คัดลอกแล้ว!', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
        }

        function cancelQueue() {
            if(confirm("ยืนยันการยกเลิกคิวหลัก? ข้อมูลในเครื่องจะหายทั้งหมด")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
